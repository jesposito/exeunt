name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Manifest version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists -- skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG does not exist -- will create."
          fi

      - name: Build extension zip
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd extension
          zip -r "../exeunt-v${VERSION}.zip" . -x "*.DS_Store" -x "__MACOSX/*"
          cd ..
          ls -lh "exeunt-v${VERSION}.zip"

      - name: Extract changelog notes
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Use awk to pull the block for this version from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > /tmp/release_notes.md
          # Fall back to generic message if nothing found
          if [ ! -s /tmp/release_notes.md ]; then
            echo "See [CHANGELOG.md](https://github.com/$GITHUB_REPOSITORY/blob/main/CHANGELOG.md) for details." \
              > /tmp/release_notes.md
          fi
          echo "--- Release notes ---"
          cat /tmp/release_notes.md

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          gh release create "$TAG" \
            "exeunt-v${VERSION}.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Exeunt v${VERSION}" \
            --notes-file /tmp/release_notes.md
          echo "Release $TAG published."
